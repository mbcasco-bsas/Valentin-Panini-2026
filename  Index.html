<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#F5F0E8;
--card:#FFFDF7;
--card2:#FFF8EC;
--ink:#1A1A1A;
--ink2:#555;
--ink3:#888;
--green:#3A8A2E;
--green-bg:#E6F5E2;
--green-border:#7DC870;
--gold:#B8860B;
--gold-bg:#FFF3C0;
--red:#C0392B;
--border:#DDD5C5;
--radius:16px;
--radius-sm:10px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--ink)}
#app{padding:16px;background:var(--bg);min-height:100vh}

.top-bar{background:var(--card);border:2px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:16px}
.top-bar-title{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.ball{font-size:26px;line-height:1}
.top-bar h1{font-size:20px;font-weight:700;color:var(--ink);line-height:1.2}
.top-bar h1 span{display:block;font-size:13px;font-weight:400;color:var(--ink2);margin-top:2px}

.progress-wrap{background:#E8E0D0;border-radius:20px;height:18px;overflow:hidden;margin-bottom:10px}
.progress-fill{height:100%;background:#3A8A2E;border-radius:20px;transition:width 0.4s;display:flex;align-items:center;justify-content:flex-end;padding-right:8px}
.progress-fill span{font-size:11px;font-weight:700;color:#fff}

.stats-row{display:flex;gap:8px;flex-wrap:wrap}
.stat-chip{background:var(--bg);border:1.5px solid var(--border);border-radius:30px;padding:5px 14px;font-size:13px;color:var(--ink2);white-space:nowrap}
.stat-chip strong{color:var(--ink);font-weight:700}
.sync-chip{border-color:#7DC870;background:#E6F5E2;color:#2e7a20}
.sync-chip.offline{border-color:#E8A09A;background:#FDECEA;color:#C0392B}

.search-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.search-bar input{flex:1;min-width:140px;font-size:15px;padding:10px 14px;border:2px solid var(--border);border-radius:30px;background:var(--card);color:var(--ink);outline:none}
.search-bar input:focus{border-color:#3A8A2E}
.search-bar select{font-size:14px;padding:10px 14px;border:2px solid var(--border);border-radius:30px;background:var(--card);color:var(--ink);outline:none;cursor:pointer}

.region-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.rpill{padding:7px 16px;border-radius:30px;font-size:13px;font-weight:600;border:2px solid var(--border);background:var(--card);color:var(--ink2);cursor:pointer;transition:all 0.15s}
.rpill.active{background:#1A1A1A;color:#fff;border-color:#1A1A1A}

.teams-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.team-card{background:var(--card);border:2px solid var(--border);border-radius:var(--radius);padding:14px 10px 12px;cursor:pointer;transition:all 0.15s;text-align:center;position:relative}
.team-card:hover{border-color:#3A8A2E;background:var(--card2);transform:translateY(-2px)}
.team-card.full{border-color:var(--green-border);background:var(--green-bg)}
.team-flag{font-size:32px;display:block;margin-bottom:6px;line-height:1}
.team-name{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:6px;line-height:1.3}
.mini-bar-wrap{background:#E8E0D0;border-radius:10px;height:8px;overflow:hidden;margin-bottom:5px}
.mini-bar-fill{height:100%;background:#3A8A2E;border-radius:10px;transition:width 0.3s}
.team-prog{font-size:12px;font-weight:700;color:var(--ink2)}
.team-prog span{color:var(--green)}
.complete-badge{position:absolute;top:6px;right:6px;font-size:14px}

.back-btn{display:inline-flex;align-items:center;gap:8px;background:var(--card);border:2px solid var(--border);border-radius:30px;padding:10px 18px;font-size:15px;font-weight:700;cursor:pointer;color:var(--ink);margin-bottom:16px;transition:all 0.15s}
.back-btn:hover{background:var(--bg);border-color:#1A1A1A}
.back-btn i{font-size:18px}

.detail-header{background:var(--card);border:2px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.d-flag{font-size:48px;line-height:1}
.d-info h2{font-size:20px;font-weight:700;color:var(--ink)}
.d-info p{font-size:13px;color:var(--ink2);margin-top:2px}
.d-progress-wrap{flex:1;min-width:120px}
.d-prog-bar{background:#E8E0D0;border-radius:10px;height:14px;overflow:hidden;margin-bottom:5px}
.d-prog-fill{height:100%;background:#3A8A2E;border-radius:10px;transition:width 0.3s}
.d-prog-text{font-size:13px;font-weight:700;color:var(--ink2)}
.d-prog-text span{color:var(--green)}

.filter-tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.ftab{padding:9px 20px;border-radius:30px;font-size:14px;font-weight:700;border:2px solid var(--border);background:var(--card);color:var(--ink2);cursor:pointer;transition:all 0.12s}
.ftab.active{background:#1A1A1A;color:#fff;border-color:#1A1A1A}

.stickers-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.sticker{background:var(--card);border:2px solid var(--border);border-radius:var(--radius-sm);padding:12px 10px;cursor:pointer;transition:all 0.12s;position:relative;text-align:center}
.sticker:hover{border-color:#1A1A1A;transform:scale(1.03)}
.sticker.got{background:var(--green-bg);border-color:var(--green-border)}
.sticker.got .s-name{color:var(--green)}
.sticker.got .s-code{color:#2e7a20}
.s-code{font-size:11px;font-weight:700;color:var(--ink3);margin-bottom:4px;letter-spacing:0.5px}
.s-name{font-size:14px;font-weight:700;color:var(--ink);line-height:1.35;margin-bottom:4px}
.s-type{display:inline-block;font-size:10px;font-weight:700;background:var(--gold-bg);color:var(--gold);border-radius:6px;padding:2px 7px;margin-top:2px}
.s-check{position:absolute;top:6px;right:6px;width:20px;height:20px;background:#3A8A2E;border-radius:50%;display:none;align-items:center;justify-content:center}
.s-check i{font-size:12px;color:#fff}
.sticker.got .s-check{display:flex}

.s-repeat{display:none;font-size:11px;font-weight:800;color:#C0392B;background:#FDECEA;border:1.5px solid #E8A09A;border-radius:8px;padding:2px 8px;margin-top:4px}
.sticker.got .s-repeat.visible{display:inline-block}

.s-minus{position:absolute;top:6px;left:6px;width:22px;height:22px;background:#C0392B;border-radius:50%;display:none;align-items:center;justify-content:center;cursor:pointer;border:none;color:#fff;font-size:14px;font-weight:700;line-height:1;padding:0;z-index:2;transition:transform 0.1s}
.s-minus:hover{transform:scale(1.15)}
.sticker.got .s-minus{display:flex}

.empty-msg{color:var(--ink2);font-size:14px;padding:24px 0;text-align:center}

.export-btn{font-size:14px;font-weight:800;padding:10px 16px;border:2px solid #1A1A1A;border-radius:30px;background:#1A1A1A;color:#fff;cursor:pointer;white-space:nowrap;transition:all .15s}
.export-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.12)}
#printReport{display:none}

    padding:0 !important;
    align-items:start;
    align-content:start;
  }

  .print-team{
    display:block !important;

    line-height:1.06;

    background:#fff;
  }

  .print-team h3{
    font-size:8.2px;

  }

  .print-line{
    font-size:7.4px;
    line-height:1.12;
    margin:0;
    color:#222;
    word-break:normal;
    overflow-wrap:anywhere;
  }

  .print-line strong{
    font-size:7.5px;
    font-weight:900;
  }

  .print-missing{color:#333}
  .print-repeated{
    color:#9B1C1C;
    font-weight:800;
    border-top:.45px solid #e1b4b4;
    margin-top:.6mm;
    padding-top:.5mm;
  }

}

let owned={};
try{owned=JSON.parse(localStorage.getItem(LOCAL_KEY)||'{}')}catch(e){owned={};}
normalizeOwned();

function normalizeOwned(){
  Object.keys(owned||{}).forEach(code=>{
    Object.keys(owned[code]||{}).forEach(n=>{
      if(owned[code][n]===true)owned[code][n]=1;
      const v=Number(owned[code][n]||0);
      if(v<=0)delete owned[code][n];
      else owned[code][n]=v;
    });
    if(!Object.keys(owned[code]||{}).length)delete owned[code];
  });
}

function saveLocal(){
  try{localStorage.setItem(LOCAL_KEY,JSON.stringify(owned));}catch(e){}
}

function hasLocalData(){
  return Object.keys(owned||{}).some(code=>Object.keys(owned[code]||{}).length>0);
}

function refreshVisible(){
  normalizeOwned();
  saveLocal();
  updateStats();
  if(curTeam){
    updateDetailHeader();
    renderStickers();
  }else{
    renderTeams();
  }
}

async function initFirebaseSync(){
  if(!FIREBASE_READY){
    setSyncStatus('Modo local: falta Firebase',false);
    saveLocal();
    return;
  }

  try{
    const app=initializeApp(firebaseConfig);
    db=getDatabase(app);
    albumRef=ref(db,'albums/'+ALBUM_ID);
    ownedRef=ref(db,'albums/'+ALBUM_ID+'/owned');

    onValue(ownedRef, async snap=>{
      const remote=snap.val()||{};

      if(firstRemoteLoad){
        firstRemoteLoad=false;
        if(!snap.exists()&&hasLocalData()){
          await set(ownedRef,owned);
          await set(ref(db,'albums/'+ALBUM_ID+'/updatedAt'),serverTimestamp());
          setSyncStatus('Sincronizado en la nube',true);
          return;
        }
      }

      owned=remote;
      isRemoteReady=true;
      setSyncStatus('Sincronizado en la nube',true);
      refreshVisible();
    }, err=>{
      console.error(err);
      isRemoteReady=false;
      setSyncStatus('Error Firebase: usando local',false);
      refreshVisible();
    });
  }catch(e){
    console.error(e);
    isRemoteReady=false;
    setSyncStatus('Error Firebase: usando local',false);
    refreshVisible();
  }
}

function save(){saveLocal();}

let curRegion='Todas';
let curTeam=null;
let curFilter='all';

function gotTeam(t){return Object.keys(owned[t.code]||{}).filter(k=>owned[t.code][k]>=1).length;}
function getCount(code,n){return (owned[code]&&owned[code][n])||0;}
function isGot(code,n){return getCount(code,n)>=1;}

async function addSticker(code,n){
  if(isRemoteReady&&ownedRef){
    const stickerRef=ref(db,'albums/'+ALBUM_ID+'/owned/'+code+'/'+n);
    await runTransaction(stickerRef,current=>(current||0)+1);
    await set(ref(db,'albums/'+ALBUM_ID+'/updatedAt'),serverTimestamp());
    return;
  }

  if(!owned[code])owned[code]={};
  owned[code][n]=(owned[code][n]||0)+1;
  saveLocal();
  refreshVisible();
  updateTeamCard(code);
}

async function removeSticker(code,n,ev){
  if(ev){ev.stopPropagation();ev.preventDefault();}
  if(isRemoteReady&&ownedRef){
    const stickerRef=ref(db,'albums/'+ALBUM_ID+'/owned/'+code+'/'+n);
    await runTransaction(stickerRef,current=>{
      const next=(current||0)-1;
      return next>0?next:null;
    });
    await set(ref(db,'albums/'+ALBUM_ID+'/updatedAt'),serverTimestamp());
    return;
  }

  if(!owned[code]||!owned[code][n])return;
  owned[code][n]--;
  if(owned[code][n]<=0)delete owned[code][n];
  saveLocal();
  refreshVisible();
  updateTeamCard(code);
}

function updateStats(){
  const total=TEAMS.reduce((a,t)=>a+gotTeam(t),0);
  const totalStickers=TEAMS.reduce((a,t)=>a+t.s.length,0);
  const pct=Math.round(total/totalStickers*100);
  const full=TEAMS.filter(t=>gotTeam(t)===t.s.length).length;
  let repeats=0;
  TEAMS.forEach(t=>{
    Object.values(owned[t.code]||{}).forEach(c=>{if(c>1)repeats+=c-1;});
  });
  document.getElementById('gotC').textContent=total;
  document.getElementById('fullT').textContent=full;
  document.getElementById('missC').textContent=totalStickers-total;
  document.getElementById('sectionsT').textContent=TEAMS.length;
  document.getElementById('repC').textContent=repeats;
  const pf=document.getElementById('mainProg');
  pf.style.width=pct+'%';
  document.getElementById('pctTxt').textContent=pct>5?pct+'%':'';
}

function updateTeamCard(code){
  const el=document.getElementById('tc-'+code);
  if(!el)return;
  const t=TEAMS.find(x=>x.code===code);
  const g=gotTeam(t);
  const pct=Math.round(g/t.s.length*100);
  el.querySelector('.mini-bar-fill').style.width=pct+'%';
  el.querySelector('.team-prog').innerHTML='<span>'+g+'</span>/'+t.s.length;
  if(g===t.s.length){el.classList.add('full');el.querySelector('.complete-badge').textContent='⭐';}
  else{el.classList.remove('full');el.querySelector('.complete-badge').textContent='';}
}

function buildRegionPills(){
  const c=document.getElementById('regionPills');
  c.innerHTML=REGIONS.map(r=>`<button class="rpill${r==='Todas'?' active':''}" onclick="setRegion('${r}',this)">${r}</button>`).join('');
}

function setRegion(r,btn){
  curRegion=r;
  document.querySelectorAll('.rpill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTeams();
}

function renderTeams(){
  const q=(document.getElementById('srch').value||'').toLowerCase();
  const list=TEAMS.filter(t=>{
    if(q&&!t.name.toLowerCase().includes(q)&&!t.code.toLowerCase().includes(q))return false;
    if(curRegion!=='Todas'&&t.region!==curRegion)return false;
    return true;
  });
  const g=document.getElementById('teamsGrid');
  g.innerHTML=list.map(t=>{
    const got=gotTeam(t);
    const pct=Math.round(got/t.s.length*100);
    const full=got===t.s.length;
    return`<div class="team-card${full?' full':''}" id="tc-${t.code}" onclick="showTeam('${t.code}')">
      <span class="complete-badge">${full?'⭐':''}</span>
      <span class="team-flag">${t.flag}</span>
      <div class="team-name">${t.name}</div>
      <div class="mini-bar-wrap"><div class="mini-bar-fill" style="width:${pct}%"></div></div>
      <div class="team-prog"><span>${got}</span>/${t.s.length}</div>
    </div>`;
  }).join('');
}

function showTeam(code){
  curTeam=TEAMS.find(t=>t.code===code);
  document.getElementById('teamsView').style.display='none';
  document.getElementById('detailView').style.display='block';
  document.getElementById('dFlag').textContent=curTeam.flag;
  document.getElementById('dName').textContent=curTeam.name;
  document.getElementById('dSub').textContent=curTeam.code+' · '+curTeam.region;
  curFilter='all';
  document.querySelector('.filter-tabs .ftab:first-child').textContent='Todas ('+curTeam.s.length+')';
  document.querySelectorAll('.ftab').forEach((b,i)=>{b.classList.toggle('active',i===0);});
  renderStickers();
  updateDetailHeader();
}

function updateDetailHeader(){
  if(!curTeam)return;
  const g=gotTeam(curTeam);
  const pct=Math.round(g/curTeam.s.length*100);
  document.getElementById('dGot').textContent=g;
  document.getElementById('dProgFill').style.width=pct+'%';
  document.getElementById('dTotal').textContent=curTeam.s.length;
  const miss=curTeam.s.length-g;
  let reps=0;
  curTeam.s.forEach(s=>{const c=getCount(curTeam.code,s.n);if(c>1)reps++;});
  document.getElementById('ftGot').textContent='Las tengo ('+g+')';
  document.getElementById('ftMiss').textContent='Me faltan ('+miss+')';
  document.getElementById('ftRep').textContent='Repetidas ('+reps+')';
}

function setFilter(f,btn){
  curFilter=f;
  document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderStickers();
}

function renderStickers(){
  updateDetailHeader();
  const stickers=curTeam.s.filter(s=>{
    const g=isGot(curTeam.code,s.n);
    if(curFilter==='got')return g;
    if(curFilter==='miss')return !g;
    if(curFilter==='rep')return getCount(curTeam.code,s.n)>1;
    return true;
  });
  const g=document.getElementById('stGrid');
  if(!stickers.length){g.innerHTML='<p class="empty-msg">No hay figuritas aquí todavía.</p>';return;}
  g.innerHTML=stickers.map(s=>{
    const got=isGot(curTeam.code,s.n);
    const count=getCount(curTeam.code,s.n);
    const special=s.t;
    return`<div class="sticker${got?' got':''}" onclick="addSticker('${curTeam.code}',${s.n})">
      <button class="s-minus" onclick="removeSticker('${curTeam.code}',${s.n},event)" title="Quitar una">−</button>
      <div class="s-code">${curTeam.code}${s.n}</div>
      <div class="s-name">${s.p}</div>
      ${special?`<span class="s-type">${s.t}</span>`:''}
      ${count>1?`<span class="s-repeat visible">x${count}</span>`:`<span class="s-repeat"></span>`}
      <div class="s-check"><i class="ti ti-check" aria-hidden="true"></i></div>
    </div>`;
  }).join('');
}

function showTeams(){
  curTeam=null;
  document.getElementById('detailView').style.display='none';
  document.getElementById('teamsView').style.display='block';
  renderTeams();
}


function stickerLabel(team,s){
  return team.code+(s.n===0?'00':s.n)+' '+s.p;
}

function formatStickerCode(teamCode,n){
  return teamCode+(Number(n)===0?'00':String(n));
}

function getRepeatedStickersByTeam(t){
  return t.s
    .map(s=>({
      code:formatStickerCode(t.code,s.n),
      name:s.p,
      count:Number(getCount(t.code,s.n)||0)
    }))
    .filter(item=>item.count>1);
}

function exportProgressPDF(){
  normalizeOwned();
  const totalStickers=TEAMS.reduce((a,t)=>a+t.s.length,0);
  const gotTotal=TEAMS.reduce((a,t)=>a+gotTeam(t),0);
  let repeats=0;
  TEAMS.forEach(t=>Object.values(owned[t.code]||{}).forEach(c=>{const qty=Number(c||0); if(qty>1)repeats+=qty-1;}));
  const complete=TEAMS.filter(t=>gotTeam(t)===t.s.length).length;
  const today=new Date().toLocaleDateString('es-AR');

  const compactCodes=(arr, emptyText)=>arr.length ? arr.join(', ') : emptyText;

  const cards=TEAMS.map(t=>{
    const got=gotTeam(t);
    const missingCodes=t.s.filter(s=>!isGot(t.code,s.n)).map(s=>formatStickerCode(t.code,s.n));
    const repeatedCodes=getRepeatedStickersByTeam(t).map(r=>`${r.code}×${r.count} (+${r.count-1})`);

    // En la exportación mostramos únicamente lo accionable:
    // figuritas que faltan y repetidas. Si una sección está completa
    // y no tiene repetidas, no ocupa espacio en el PDF.
    if(!missingCodes.length && !repeatedCodes.length) return '';

    return `<div class="print-team">
      <h3>${t.flag} ${t.name} · faltan ${missingCodes.length} · rep ${repeatedCodes.length}</h3>
      ${missingCodes.length > 0 ? `<div class="print-line print-missing"><strong>FALTAN:</strong> ${missingCodes.join(', ')}</div>` : ''}
      ${repeatedCodes.length > 0 ? `<div class="print-line print-repeated"><strong>REPETIDAS:</strong> ${repeatedCodes.join(', ')}</div>` : ''}
    </div>`;
  }).join('');

  const report=document.getElementById('printReport');
  report.innerHTML=`
    <div class="print-header">
      <h1>Álbum Panini 2026 · faltantes y repetidas</h1>
    </div>
    <div class="print-stats">
      <div class="print-stat"><strong>${gotTotal}</strong>Tengo</div>
      <div class="print-stat"><strong>${totalStickers-gotTotal}</strong>Faltan</div>
      <div class="print-stat"><strong>${complete}/${TEAMS.length}</strong>Comp.</div>
      <div class="print-stat"><strong>${repeats}</strong>Rep. extra</div>
    </div>
    <div class="print-grid">${cards}</div>
  `;

  requestAnimationFrame(()=>setTimeout(()=>window.print(),150));
}

window.renderTeams=renderTeams;
window.setRegion=setRegion;
window.showTeam=showTeam;
window.showTeams=showTeams;
window.setFilter=setFilter;
window.addSticker=addSticker;
window.removeSticker=removeSticker;
window.exportProgressPDF=exportProgressPDF;

buildRegionPills();
refreshVisible();
initFirebaseSync();
</script>
